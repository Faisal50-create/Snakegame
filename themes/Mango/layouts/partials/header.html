<header class="page-header">
  <div class="header-container">
    <a href="{{ "/" | relURL }}" class="logo-section" aria-label="Go to Homepage">
       <span class="logo-icon">
       
        <img src="/images/snake-logo.svg" alt="Snake Logo" width="32" height="32">
      </span>
      <div>
        <span class="logo-text">
    <span style="color:#ffffff;">Yılan</span>
    <span style="color:#e94560;"> Oyunu</span>
</span>
        <span style="color:#ffffff;" class="logo-sub" >Ücretsiz oyna</span>
      </div>
    </a>

    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-menu" id="navMenu" aria-label="Main Navigation">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" 
           class="{{ if eq $.Page.Permalink .URL }}active{{ end }}"
           {{ if eq .URL "/" }}aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
