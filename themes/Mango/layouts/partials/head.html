{{ if .IsHome }}
  <title>Yılan Oyunu – Google Yılan Oyunu Oyna | Ücretsiz Yılan Oyunları</title>
  <meta name="description" content="Yılan Oyunu oyna! Google Yılan oyununu ücretsiz keşfet, en yüksek skoru yap ve klasik Snake deneyimini mobil veya bilgisayarda hemen yaşa.">
  <meta name="keywords" content="snake game, classic snake, play snake online, arcade game, free snake game, retro game">
  <meta property="og:title" content="Yılan Oyunu – Google Yılan Oyunu Oyna | Ücretsiz Yılan Oyunları">
  <meta property="og:description" content="Play the classic Snake game online for free. Control the snake, eat food, and grow while avoiding walls and your own tail.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ "images/snake-og-image.jpg" | absURL }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Yılan Oyunu – Google Yılan Oyunu Oyna | Ücretsiz Yılan Oyunları">
  <meta name="twitter:description" content="Yılan Oyunu oyna! Google Yılan oyununu ücretsiz keşfet, en yüksek skoru yap ve klasik Snake deneyimini mobil veya bilgisayarda hemen yaşa.">
  {{ else }}
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Params.description | default "Play the classic Snake game online for free." }}">
  <meta name="robots" content="noindex, follow">
{{ end }}

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">

{{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Yılan Oyunu",
    "description": "Yılan Oyunu oyna! Google Yılan oyununu ücretsiz keşfet, en yüksek skoru yap ve klasik Snake deneyimini mobil veya bilgisayarda hemen yaşa.",
    "applicationCategory": "Game",
    "browserRequirements": "Requires JavaScript",
    "operatingSystem": "All",
    "url": "{{ .Permalink }}"
  }
  </script>
{{ end }}
